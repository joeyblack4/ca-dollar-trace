# Daily ingest: pull sources, publish JSON, commit if changed.
# Grants Portal publishes ~8:45pm PT (03:45/04:45 UTC); run after at 05:15 UTC.
# Committing published JSON gives free provenance history (one commit per data
# change) and auto-triggers the Cloudflare Workers Builds deploy on main.
# When the parquet drill-down layer lands, this switches to CDT_STORAGE_MODE=r2.
name: ingest-daily

on:
  schedule:
    - cron: "15 5 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ingest
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      # Persist per-source manifests (content hashes) across runs so an
      # unchanged upstream is a true no-op: no re-publish, no timestamp churn,
      # no empty commit. Keys are immutable, so save under run_id and restore
      # the most recent.
      - uses: actions/cache/restore@v4
        with:
          path: data/manifest
          key: manifest-${{ github.run_id }}
          restore-keys: |
            manifest-
      - run: uv sync
        working-directory: pipeline
      - name: Run pipeline (all sources)
        working-directory: pipeline
        run: |
          uv run cadollar run-all
          uv run cadollar sync-site
      # save manifests only on success: a failed run must be fully retried
      # next time, not have its already-ingested changes swallowed by a
      # matching content hash while the site copy was never updated
      - uses: actions/cache/save@v4
        if: success()
        with:
          path: data/manifest
          key: manifest-${{ github.run_id }}
      - name: Commit refreshed data
        run: |
          git config user.name "ca-dollar-trace bot"
          git config user.email "actions@users.noreply.github.com"
          git add site/public/data
          if git diff --cached --quiet; then
            echo "no data changes"
          else
            git commit -m "data: daily ingest $(date -u +%F)"
            git push
          fi
